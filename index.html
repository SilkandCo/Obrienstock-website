<!DOCTYPE html>
<html>
<head>
<title>Silk & Co</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f3ee;
  text-align: center;
}

/* HERO */
.hero {
  background: #f4f3ee;
  padding: 60px 20px;
}

.hero h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.hero p {
  color: #666;
  margin-bottom: 20px;
}

.button {
  display: inline-block;
  padding: 12px 25px;
  background: black;
  color: white;
  text-decoration: none;
}

/* PRODUCTS */
.section {
  padding: 50px 20px;
}

.section h2 {
  margin-bottom: 30px;
}

.products {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: white;
  padding: 20px;
  width: 220px;
}

.card img {
  width: 100%;
}

.card h3 {
  margin: 10px 0;
}

.price {
  font-weight: bold;
  margin: 10px 0;
}

.old-price {
  text-decoration: line-through;
  color: #999;
  font-size: 14px;
}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>Premium Labels. Smarter Prices.</h1>
  <p>Up to 30% off retail</p>
  <a class="button" href="#">Shop Now</a>
</div>

<!-- PRODUCTS -->
<div class="section">
  <h2>Latest Arrivals</h2>

  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/220">
      <h3>Nike Fleece Hoodie</h3>
      <p class="price">£23 <span class="old-price">£35</span></p>
      <p>RRP £55</p>
      <a class="button" href="#">Shop Now</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/220">
      <h3>Adidas Originals Sweatshirt</h3>
      <p class="price">£18 <span class="old-price">£30</span></p>
      <p>RRP £50</p>
      <a class="button" href="#">Shop Now</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/220">
      <h3>The North Face Puffer</h3>
      <p class="price">£65 <span class="old-price">£75</span></p>
      <p>RRP £140</p>
      <a class="button" href="#">Shop Now</a>
    </div>

  </div>

</div>

<!-- ABOUT -->
<div class="section">
  <h2>About Silk & Co</h2>
  <p>Premium branded clothing at smarter prices.</p>
</div>

</body>
</html>
