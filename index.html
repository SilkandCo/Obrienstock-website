<!DOCTYPE html>
<html>
<head>
<title>Silk & Co.</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f3ee;
}

/* NAV / BRAND */
.brand {
  text-align: center;
  padding: 20px;
  font-weight: bold;
  letter-spacing: 2px;
}

/* HERO IMAGE */
.hero {
  position: relative;
  height: 400px;
  background: url('https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero-overlay {
  background: rgba(255,255,255,0.7);
  padding: 40px;
  text-align: center;
}

.hero h1 {
  margin: 0;
  font-size: 32px;
}

.hero p {
  margin: 10px 0;
}

.button {
  display: inline-block;
  padding: 10px 20px;
  background: black;
  color: white;
  text-decoration: none;
  margin-top: 10px;
}

/* SECTION */
.section {
  text-align: center;
  padding: 40px 20px;
}

.section h2 {
  margin-bottom: 10px;
}

/* PRODUCTS */
.products {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  width: 200px;
  background: white;
  padding: 15px;
}

.card img {
  width: 100%;
}

.price {
  font-weight: bold;
}

.old {
  text-decoration: line-through;
  color: grey;
  font-size: 14px;
}

.rrp {
  font-size: 14px;
  color: #666;
}
</style>

</head>

<body>

<div class="brand">Silk & Co.</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-overlay">
    <h1>Premium Labels. Smarter Prices.</h1>
    <p>Up to 30% off RRP</p>
    <p>Extra 5% off orders over £85</p>
    <a class="button" href="#">Shop Now</a>
  </div>
</div>

<!-- PRODUCTS -->
<div class="section">
  <h2>Latest Arrivals</h2>
  <p>Branded sport and casual wear at unbeatable prices.</p>

  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?auto=format&fit=crop&w=400&q=80">
      <p>Nike Fleece Hoodie</p>
      <p class="price">£23 <span class="old">£35</span></p>
      <p class="rrp">RRP £55</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1593032465171-8f0b9c0f0c9d?auto=format&fit=crop&w=400&q=80">
      <p>Adidas Sweatshirt</p>
      <p class="price">£18 <span class="old">£30</span></p>
      <p class="rrp">RRP £50</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1548883354-7622d03aca27?auto=format&fit=crop&w=400&q=80">
      <p>North Face Puffer</p>
      <p class="price">£65 <span class="old">£75</span></p>
      <p class="rrp">RRP £140</p>
    </div>

  </div>
</div>

</body>
</html>
